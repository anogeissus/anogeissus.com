<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Admin | Anogeissus</title>
    <link rel="icon" type="image/png" href="/images/apolloone-icon.png">
    <link rel="apple-touch-icon" href="/images/apolloone-icon.png">

  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="css/style.css?v=23">
</head>
<body>
<script>
  window.location.replace('/admin-panel.html');
</script>
<section class="section legal-page blog-admin-page">
  <div class="legal-content">
    <h1>Blog Admin</h1>

    <div id="app-card" class="blog-admin-card">
      <div class="blog-admin-actions">
        <button id="new-btn">New Post</button>
        <button id="signout-btn">Sign Out</button>
      </div>

      <h2>Create / Edit Post</h2>
      <form id="post-form" class="blog-admin-form">
        <label>Title<input id="title" required></label>
        <label>Slug<input id="slug" placeholder="auto-generated-from-title"></label>
        <label>Excerpt<textarea id="excerpt" rows="2"></textarea></label>
        <label>Cover image URL<input id="cover_image_url" type="url"></label>
        <label>Content<textarea id="content" rows="12" required></textarea></label>
        <label>Status
          <select id="status">
            <option value="draft">draft</option>
            <option value="published">published</option>
          </select>
        </label>
        <label>Publish date/time (optional)<input id="published_at" type="datetime-local"></label>
        <button id="save-btn" type="submit">Create Post</button>
      </form>
      <p id="save-msg" class="blog-admin-msg"></p>

      <h2>Posts</h2>
      <div class="blog-table-wrap">
        <table class="blog-admin-table">
          <thead>
            <tr><th>Title</th><th>Slug</th><th>Status</th><th>Published</th><th>Actions</th></tr>
          </thead>
          <tbody id="posts-tbody"><tr><td colspan="5">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/admin-blog.js"></script>
</body>
</html>
