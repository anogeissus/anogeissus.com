<script>
(function(){
  var h=document.getElementById('hamburger'),n=document.getElementById('nav-links'),o=document.getElementById('nav-overlay');
  function t(){var x=h.classList.toggle('open');n.classList.toggle('open',x);o.classList.toggle('visible',x)}
  function c(){h.classList.remove('open');n.classList.remove('open');o.classList.remove('visible')}
  h.addEventListener('click',t);o.addEventListener('click',c);
  n.querySelectorAll('a').forEach(function(a){if(!a.classList.contains('nav-dropdown-toggle'))a.addEventListener('click',c)});

  var dropdownToggle=document.querySelector('.nav-dropdown-toggle');
  var dropdown=document.querySelector('.nav-dropdown');
  if(dropdownToggle&&dropdown){
    dropdownToggle.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();dropdown.classList.toggle('open');});
    document.addEventListener('click',function(e){if(!dropdown.contains(e.target)){dropdown.classList.remove('open');}});
  }
})();
</script>
