<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog | Anogeissus</title>
  <meta name="robots" content="noindex">
  <script>
    // Posts are static pages now — forward old ?slug= links to /blog/<slug>/.
    (function () {
      var slug = new URLSearchParams(location.search).get('slug');
      location.replace(slug ? '/blog/' + encodeURIComponent(slug) + '/' : '/blog.html');
    })();
  </script>
</head>
<body></body>
</html>
